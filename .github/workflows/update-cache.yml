name: Atualizar Cache

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  update-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Chamar API de atualização
        run: |
          curl -X GET \
            "https://${{ secrets.VERCEL_URL }}/api/cron/update-cache" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
